name: BTC Price LINE Notify

on:
  schedule:
    # GitHub Actionsのcronは UTC 基準
    # JST 0:00 / 6:00 / 8:00 / 12:00 / 14:00 / 17:00 / 20:00 に合わせて
    # UTC 15:00(前日) / 21:00(前日) / 23:00(前日) / 3:00 / 5:00 / 8:00 / 11:00 に実行
    - cron: "0 3,5,8,11,15,21,23 * * *"
    workflow_dispatch: {}  # 手動実行用ボタン(Actionsタブから即実行してテストできる)

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run BTC notify script
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python3 btc_notify.py
